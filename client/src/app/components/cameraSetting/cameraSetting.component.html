<div class="settings-trigger">
  <ion-button fill="clear" (click)="togglePanel($event)">
    <ion-icon slot="icon-only" name="videocam-outline"></ion-icon>
  </ion-button>
</div>

<div class="settings-overlay glass scrollable" *ngIf="isOpen" (click)="$event.stopPropagation()">
  <div class="settings-header">
    <h3>Camera Source</h3>
    <ion-button fill="clear" color="light" (click)="togglePanel($event)">
      <ion-icon slot="icon-only" name="close-outline"></ion-icon>
    </ion-button>
  </div>

  <div class="settings-content">
    <div class="settings-section" *ngIf="cameras.length > 0">
      <span class="section-title">Camera Device</span>
      <ion-item class="bg-transparent text-white">
        <ion-select [value]="selectedCameraId || 'default'" (ionChange)="onCameraSelect($event)" interface="popover">
          <ion-select-option value="default">Default Direction</ion-select-option>
          <ion-select-option *ngFor="let cam of cameras; trackBy: trackByCameraId" [value]="cam.deviceId">
            {{ cam.label || 'Webcam ' + cam.deviceId.substring(0, 5) }}
          </ion-select-option>
        </ion-select>
      </ion-item>
    </div>

    <div class="settings-section" *ngIf="!selectedCameraId">
      <span class="section-title">Facing Direction</span>
      <ion-segment [value]="isFrontCamera ? 'front' : 'back'" (ionChange)="onCameraDirectionToggle($event)">
        <ion-segment-button value="front">
          <ion-label>Front</ion-label>
        </ion-segment-button>
        <ion-segment-button value="back">
          <ion-label>Back</ion-label>
        </ion-segment-button>
      </ion-segment>
    </div>
  </div>
</div>
