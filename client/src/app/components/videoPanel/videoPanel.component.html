<div class="video-container" [ngClass]="[getRatioClass(), isFrontCamera ? 'mirrored' : '', getFrameStatusClass()]">
  <video #videoElement autoplay playsinline muted aria-hidden="true"></video>
  <canvas #canvasOverlay class="canvas-overlay" role="img" aria-label="Webcam feed with hand landmarker tracking overlay"></canvas>

  <div class="frame-caution-overlay" *ngIf="currentFrameStatus === 'error' && currentFrameErrorMessage">
    <span class="warning-dot"></span>
    <span class="caution-text">{{ currentFrameErrorMessage }}</span>
  </div>

  <div class="camera-loader" *ngIf="(isLoading || loadSuccessMessage) && !errorMessage" [class.success-state]="loadSuccessMessage">
    <div class="custom-spinner" *ngIf="isLoading"></div>
    <div class="success-check" *ngIf="loadSuccessMessage">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <p class="loader-text">
      {{ loadSuccessMessage ? 'Model Loaded in ' + loadTimeMs + 'ms' : 'Loading Model...' }}
    </p>
  </div>

  <div class="error-banner" *ngIf="errorMessage">
    <p>{{ errorMessage }}</p>
  </div>
</div>
